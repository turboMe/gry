<!DOCTYPE html>
<html lang="pl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Między Nami — Symulator Relacji</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Source+Sans+3:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    /* ══════════════════════════════════════════
   RESET & VARIABLES
   ══════════════════════════════════════════ */
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-deep: #0c0c14;
      --bg-panel: #14141f;
      --bg-card: #1c1c2e;
      --bg-card-hover: #252540;
      --accent-cyan: #00e5ff;
      --accent-magenta: #ff2d7b;
      --accent-gold: #ffd740;
      --accent-green: #00e676;
      --accent-red: #ff3d3d;
      --accent-orange: #ff9100;
      --accent-purple: #b388ff;
      --accent-blue: #42a5f5;
      --text-primary: #e8e8f0;
      --text-secondary: #8888a8;
      --text-dim: #555570;
      --tension-color: #ff5252;
      --trust-color: #00e5ff;
      --openness-color: #ffd740;
      --heard-color: #ab47bc;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'Source Sans 3', -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg-deep);
      color: var(--text-primary);
      font-family: var(--font-body);
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
    }

    #game-container {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* ══════════════════════════════════════════
   SCROLLABLE AREA
   ══════════════════════════════════════════ */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-y;
      padding: 0 16px 120px 16px;
    }

    /* ══════════════════════════════════════════
   SCREENS & TRANSITIONS
   ══════════════════════════════════════════ */
    .screen {
      display: none;
      width: 100%;
      min-height: 100%;
      flex-direction: column;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .screen.active {
      display: flex;
      opacity: 1;
    }

    .screen.fade-in {
      animation: fadeSlideUp 0.6s ease forwards;
    }

    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ══════════════════════════════════════════
   MENU SCREEN
   ══════════════════════════════════════════ */
    #menu-screen {
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 40px 24px;
      min-height: 100vh;
    }

    .menu-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(ellipse at 30% 20%, rgba(0, 229, 255, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 70% 80%, rgba(255, 45, 123, 0.06) 0%, transparent 60%),
        var(--bg-deep);
      z-index: 0;
    }

    .menu-content {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
    }

    .game-logo {
      font-family: var(--font-display);
      font-size: clamp(2.4rem, 8vw, 3.8rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-magenta));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 30px rgba(0, 229, 255, 0.2));
    }

    .game-subtitle {
      font-size: clamp(0.85rem, 2.5vw, 1rem);
      color: var(--text-secondary);
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 40px;
    }

    .menu-divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent-cyan), var(--accent-magenta));
      margin: 0 auto 32px;
      border-radius: 1px;
    }

    .menu-stats {
      font-family: var(--font-mono);
      font-size: 0.82rem;
      color: var(--accent-gold);
      margin-bottom: 28px;
      opacity: 0.9;
    }

    .menu-stats:empty {
      display: none;
    }

    .menu-nav {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }

    .menu-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      border-radius: 14px;
      background: var(--bg-card);
      border: 1.5px solid rgba(255, 255, 255, 0.08);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: left;
      width: 100%;
    }

    .menu-btn:active {
      transform: scale(0.97);
      background: var(--bg-card-hover);
    }

    .menu-btn .btn-icon {
      font-size: 1.3rem;
      flex-shrink: 0;
      width: 36px;
      text-align: center;
    }

    .menu-btn .btn-label {
      flex: 1;
    }

    .menu-btn .btn-arrow {
      color: var(--text-dim);
      font-size: 0.9rem;
    }

    .menu-btn.primary {
      background: linear-gradient(135deg, var(--accent-cyan), #0091ea);
      color: #000;
      border-color: transparent;
      box-shadow: 0 4px 30px rgba(0, 229, 255, 0.25);
    }

    .menu-btn.resume {
      background: linear-gradient(135deg, var(--accent-gold), var(--accent-orange));
      color: #000;
      border-color: transparent;
    }

    .menu-hint {
      margin-top: 16px;
      font-size: 0.8rem;
      color: var(--text-dim);
    }

    /* ══════════════════════════════════════════
   PROFILE QUIZ SCREEN
   ══════════════════════════════════════════ */
    .quiz-header {
      text-align: center;
      padding: 30px 0 20px;
    }

    .quiz-header h2 {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .quiz-header p {
      color: var(--text-secondary);
      font-size: 0.88rem;
    }

    .quiz-progress-bar {
      height: 4px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 2px;
      margin: 16px 0 24px;
      overflow: hidden;
    }

    .quiz-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-cyan), var(--accent-magenta));
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    .quiz-question-text {
      font-size: 1.05rem;
      line-height: 1.6;
      margin-bottom: 20px;
      color: var(--text-primary);
    }

    .quiz-answers {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .quiz-answer {
      padding: 14px 16px;
      background: var(--bg-card);
      border: 1.5px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      cursor: pointer;
      font-size: 0.9rem;
      line-height: 1.5;
      color: var(--text-secondary);
      transition: all 0.2s ease;
    }

    .quiz-answer:active {
      transform: scale(0.98);
    }

    .quiz-answer:hover {
      border-color: rgba(0, 229, 255, 0.3);
      background: var(--bg-card-hover);
    }

    .quiz-answer.selected {
      border-color: var(--accent-cyan);
      background: rgba(0, 229, 255, 0.06);
      color: var(--text-primary);
    }

    /* ══════════════════════════════════════════
   SCENARIO SELECT SCREEN
   ══════════════════════════════════════════ */
    .select-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px 0 16px;
    }

    .back-btn {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 12px;
      background: var(--bg-card);
      color: var(--text-secondary);
      font-size: 1.1rem;
      cursor: pointer;
    }

    .back-btn:active {
      transform: scale(0.95);
    }

    .select-header h2 {
      font-family: var(--font-display);
      font-size: 1.3rem;
      font-weight: 700;
    }

    .category-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .category-card {
      padding: 20px 16px;
      background: var(--bg-card);
      border: 1.5px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .category-card:active {
      transform: scale(0.97);
    }

    .category-card:hover {
      border-color: rgba(0, 229, 255, 0.3);
    }

    .category-card .cat-icon {
      font-size: 2rem;
      margin-bottom: 8px;
    }

    .category-card .cat-name {
      font-size: 0.88rem;
      font-weight: 600;
    }

    .category-card .cat-count {
      font-size: 0.72rem;
      color: var(--text-dim);
      margin-top: 4px;
    }

    .scenario-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .scenario-card {
      padding: 16px;
      background: var(--bg-card);
      border: 1.5px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .scenario-card:active {
      transform: scale(0.98);
    }

    .scenario-card:hover {
      border-color: rgba(0, 229, 255, 0.3);
    }

    .scenario-card .sc-title {
      font-family: var(--font-display);
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .scenario-card .sc-subtitle {
      font-size: 0.82rem;
      color: var(--text-secondary);
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .scenario-card .sc-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .sc-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 500;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-dim);
    }

    .sc-tag.difficulty-beginner {
      color: var(--accent-green);
      background: rgba(0, 230, 118, 0.1);
    }

    .sc-tag.difficulty-intermediate {
      color: var(--accent-gold);
      background: rgba(255, 215, 64, 0.1);
    }

    .sc-tag.difficulty-advanced {
      color: var(--accent-orange);
      background: rgba(255, 145, 0, 0.1);
    }

    .sc-tag.difficulty-expert {
      color: var(--accent-red);
      background: rgba(255, 61, 61, 0.1);
    }

    .sc-best {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--accent-green);
    }

    /* ══════════════════════════════════════════
   PROFILE VIEW SCREEN
   ══════════════════════════════════════════ */
    .profile-view-header {
      text-align: center;
      padding: 30px 0 20px;
    }

    .profile-view-header h2 {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .profile-view-header p {
      color: var(--text-secondary);
      font-size: 0.88rem;
    }

    .trait-bar-group {
      margin-bottom: 14px;
    }

    .trait-bar-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
      font-size: 0.82rem;
    }

    .trait-bar-label .tbl-name {
      color: var(--text-secondary);
    }

    .trait-bar-label .tbl-val {
      font-family: var(--font-mono);
      color: var(--accent-cyan);
      font-size: 0.78rem;
    }

    .trait-bar-track {
      height: 6px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 3px;
      overflow: hidden;
    }

    .trait-bar-fill {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--accent-cyan), var(--accent-magenta));
      transition: width 0.6s ease;
    }

    .profile-reset-btn {
      margin-top: 20px;
      padding: 12px 24px;
      border: 1.5px solid rgba(255, 61, 61, 0.3);
      border-radius: 12px;
      background: transparent;
      color: var(--accent-red);
      font-size: 0.85rem;
      cursor: pointer;
      width: 100%;
    }

    /* ══════════════════════════════════════════
   CHARACTER PROFILES (pre-game)
   ══════════════════════════════════════════ */
    .profile-header {
      text-align: center;
      padding: 30px 0 20px;
    }

    .profile-header h2 {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .profile-header p {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .profile-card {
      background: var(--bg-card);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .profile-card .card-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      margin-bottom: 10px;
    }

    .profile-card .char-name {
      font-family: var(--font-display);
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .profile-card .char-role {
      font-size: 0.85rem;
      color: var(--accent-cyan);
      margin-bottom: 12px;
    }

    .profile-card .char-desc {
      font-size: 0.88rem;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .trait-tag {
      display: inline-block;
      padding: 4px 12px;
      margin: 3px 4px 3px 0;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      font-size: 0.78rem;
      color: var(--text-secondary);
    }

    .trait-tag.negative {
      border-color: rgba(255, 61, 61, 0.3);
      color: var(--accent-red);
    }

    .trait-tag.positive {
      border-color: rgba(0, 230, 118, 0.3);
      color: var(--accent-green);
    }

    .trait-tag.neutral {
      border-color: rgba(255, 215, 64, 0.3);
      color: var(--accent-gold);
    }

    .hidden-need {
      margin-top: 12px;
      padding: 10px 14px;
      background: rgba(255, 215, 64, 0.06);
      border-left: 3px solid var(--accent-gold);
      border-radius: 0 8px 8px 0;
      font-size: 0.82rem;
      color: var(--accent-gold);
    }

    .continue-btn {
      display: block;
      width: 100%;
      padding: 16px;
      margin-top: 20px;
      margin-bottom: 30px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent-cyan), #0091ea);
      color: #000;
      font-family: var(--font-body);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    .continue-btn:active {
      transform: scale(0.97);
    }

    /* ══════════════════════════════════════════
   INTERACTION SCREEN
   ══════════════════════════════════════════ */
    .interaction-top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: var(--bg-panel);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      flex-shrink: 0;
    }

    .interaction-label {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .interaction-progress {
      display: flex;
      gap: 6px;
    }

    .progress-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--bg-card);
      border: 1.5px solid var(--text-dim);
      transition: all 0.3s ease;
    }

    .progress-dot.done {
      background: var(--accent-cyan);
      border-color: var(--accent-cyan);
      box-shadow: 0 0 8px rgba(0, 229, 255, 0.4);
    }

    .progress-dot.current {
      border-color: var(--accent-gold);
      box-shadow: 0 0 8px rgba(255, 215, 64, 0.4);
      animation: dotPulse 1.5s ease infinite;
    }

    @keyframes dotPulse {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.3);
      }
    }

    /* ── METERS BAR ── */
    .meters-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding: 10px 16px;
      background: var(--bg-panel);
      flex-shrink: 0;
    }

    .meter-item {
      text-align: center;
    }

    .meter-icon {
      font-size: 1rem;
      margin-bottom: 2px;
    }

    .meter-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      margin-bottom: 4px;
    }

    .meter-track {
      height: 4px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 2px;
      overflow: hidden;
    }

    .meter-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .meter-fill.tension {
      background: var(--tension-color);
    }

    .meter-fill.trust {
      background: var(--trust-color);
    }

    .meter-fill.openness {
      background: var(--openness-color);
    }

    .meter-fill.heard {
      background: var(--heard-color);
    }

    /* ── COMIC PANEL ── */
    .comic-scene {
      padding: 20px 0;
    }

    .scene-title {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .scene-subtitle {
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-bottom: 16px;
    }

    .comic-panel {
      position: relative;
      background: var(--bg-card);
      border: 2px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .panel-illustration {
      width: 100%;
      aspect-ratio: 16/9;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .scene-art {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    .scene-art canvas {
      width: 100%;
      height: 100%;
    }

    .panel-situation {
      padding: 16px 18px;
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--text-secondary);
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .panel-situation em {
      color: var(--text-primary);
      font-style: normal;
      font-weight: 500;
    }

    /* ── SPEECH BUBBLE ── */
    .speech-bubble-wrap {
      padding: 0 18px 18px;
    }

    .speech-bubble {
      position: relative;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px 16px 16px 4px;
      padding: 14px 18px;
      font-size: 0.95rem;
      line-height: 1.5;
      color: var(--text-primary);
    }

    .speech-bubble .speaker {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--accent-magenta);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 6px;
    }

    .speech-bubble::before {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 16px;
      width: 0;
      height: 0;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 8px solid rgba(255, 255, 255, 0.07);
    }

    /* ── NPC REACTION BUBBLE ── */
    .npc-reaction-wrap {
      padding: 0 18px 10px;
    }

    .npc-reaction-bubble {
      position: relative;
      background: rgba(255, 45, 123, 0.06);
      border: 1px solid rgba(255, 45, 123, 0.15);
      border-radius: 4px 16px 16px 16px;
      padding: 14px 18px;
      font-size: 0.9rem;
      line-height: 1.5;
      color: var(--text-secondary);
      animation: fadeSlideUp 0.4s ease;
    }

    .npc-reaction-bubble .speaker {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--accent-magenta);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 6px;
    }

    /* ── CHOICES ── */
    .choices-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      margin-bottom: 10px;
    }

    .choice-card {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 16px;
      margin-bottom: 10px;
      background: var(--bg-card);
      border: 1.5px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .choice-card:active {
      transform: scale(0.98);
      background: var(--bg-card-hover);
    }

    .choice-card:hover {
      border-color: rgba(0, 229, 255, 0.3);
      background: var(--bg-card-hover);
    }

    .choice-letter {
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.06);
      border: 1.5px solid rgba(255, 255, 255, 0.12);
      font-family: var(--font-mono);
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .choice-text {
      font-size: 0.88rem;
      line-height: 1.5;
      color: var(--text-secondary);
    }

    .choice-card.selected {
      border-color: var(--accent-cyan);
      background: rgba(0, 229, 255, 0.06);
    }

    .choice-card.selected .choice-letter {
      background: var(--accent-cyan);
      border-color: var(--accent-cyan);
      color: #000;
    }

    .choice-card.selected .choice-text {
      color: var(--text-primary);
    }

    .choice-card.result-best {
      border-color: var(--accent-green);
      background: rgba(0, 230, 118, 0.06);
    }

    .choice-card.result-best .choice-letter {
      background: var(--accent-green);
      border-color: var(--accent-green);
      color: #000;
    }

    .choice-card.result-good {
      border-color: var(--accent-gold);
      background: rgba(255, 215, 64, 0.06);
    }

    .choice-card.result-good .choice-letter {
      background: var(--accent-gold);
      border-color: var(--accent-gold);
      color: #000;
    }

    .choice-card.result-bad {
      border-color: var(--accent-red);
      background: rgba(255, 61, 61, 0.04);
      opacity: 0.7;
    }

    .choice-card.result-bad .choice-letter {
      background: var(--accent-red);
      border-color: var(--accent-red);
      color: #fff;
    }

    /* ── FEEDBACK PANEL ── */
    .feedback-panel {
      margin-top: 16px;
      padding: 18px;
      background: var(--bg-card);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      animation: fadeSlideUp 0.5s ease;
    }

    .feedback-verdict {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .verdict-icon {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
    }

    .verdict-icon.best {
      background: rgba(0, 230, 118, 0.15);
    }

    .verdict-icon.good {
      background: rgba(255, 215, 64, 0.15);
    }

    .verdict-icon.bad {
      background: rgba(255, 61, 61, 0.15);
    }

    .verdict-text {
      font-weight: 600;
      font-size: 0.9rem;
    }

    .verdict-text.best {
      color: var(--accent-green);
    }

    .verdict-text.good {
      color: var(--accent-gold);
    }

    .verdict-text.bad {
      color: var(--accent-red);

    .feedback-points {
      font-family: var(--font-mono);

      margin-bottom: 12px;
      color: var(--text-dim);
    }

    .feedback-points span {
      color: var(--accent-cyan);

    }

    .feedback-body {
      font-size: 0.88rem;
      line-height: 1.65;

    }

    .feedback-body strong {

      font-weight: 600;
    }

    .feedback-hint {
      margin-top: 12px;
      padding: 10px 14px;
      background: rgba(0, 229, 255, 0.05);
      border-left: 3px solid var(--accent-cyan);
      border-radius: 0 8px 8px 0;
      font-size: 0.82rem;
      color: var(--accent-cyan);
      line-height: 1.5;
    }

    .psych-tag {
      display: inline-block;
      padding: 3px 10px;
      margin: 6px 4px 0 0;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.05em;
    }

    .psych-tag.error {
      background: rgba(255, 61, 61, 0.12);
      color: var(--accent-red);
    }

    .psych-tag.skill {
      background: rgba(0, 230, 118, 0.12);
      color: var(--accent-green);
    }

    .psych-tag.concept {
      background: rgba(0, 229, 255, 0.12);
      color: var(--accent-cyan);
    }

    /* ══════════════════════════════════════════
   ENDING SCREEN
   ══════════════════════════════════════════ */
    .ending-screen {
      padding: 30px 0 50px;
      text-align: center;
    }

    .ending-badge {
      width: 100px;
      height: 100px;
      margin: 0 auto 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      animation: badgePop 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes badgePop {
      0% {
        transform: scale(0);
        opacity: 0;
      }

      60% {
        transform: scale(1.15);
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .ending-badge.red {
      background: rgba(255, 61, 61, 0.15);
      border: 2px solid var(--accent-red);
    }

    .ending-badge.yellow {
      background: rgba(255, 215, 64, 0.15);
      border: 2px solid var(--accent-gold);
    }

    .ending-badge.green {
      background: rgba(0, 230, 118, 0.15);
      border: 2px solid var(--accent-green);
    }

    .ending-title {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .ending-title.red {
      color: var(--accent-red);
    }

    .ending-title.yellow {
      color: var(--accent-gold);
    }

    .ending-title.green {
      color: var(--accent-green);
    }

    .ending-score {
      font-family: var(--font-mono);
      font-size: 1rem;
      color: var(--text-dim);
      margin-bottom: 20px;
    }

    .ending-score span {
      color: var(--accent-cyan);
    }

    .ending-narrative {
      background: var(--bg-card);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      padding: 20px;
      margin: 0 auto 20px;

    .ending-diagnosis {
      background: var(--bg-card);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      padding: 20px;
      margin: 0 auto 20px;
      max-width: 400px;
      text-align: left;
    }

    .ending-diagnosis h4 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      margin-bottom: 10px;
    }

    .ending-diagnosis p {
      font-size: 0.88rem;
      line-height: 1.6;
      color: var(--text-secondary);
    }

    .new-best-banner {
      display: none;
      padding: 8px 20px;
      background: linear-gradient(135deg, var(--accent-gold), var(--accent-orange));
      color: #000;
      font-weight: 700;
      font-size: 0.85rem;
      border-radius: 30px;
      margin: 0 auto 16px;
      width: fit-content;
      animation: bestPulse 0.8s ease;
    }

    @keyframes bestPulse {
      0% {
        transform: scale(0.5);
        opacity: 0;
      }

      50% {
        transform: scale(1.1);
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .new-best-banner.show {
      display: inline-block;
    }

    .choices-summary {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin: 12px 0;
    }

    .choice-dot {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 700;
    }

    .choice-dot.pts-0 {
      background: rgba(255, 61, 61, 0.15);
      color: var(--accent-red);
      border: 2px solid var(--accent-red);
    }

    .choice-dot.pts-1 {
      background: rgba(255, 215, 64, 0.15);
      color: var(--accent-gold);
      border: 2px solid var(--accent-gold);
    }

    .choice-dot.pts-2 {
      background: rgba(0, 230, 118, 0.15);
      color: var(--accent-green);
      border: 2px solid var(--accent-green);
    }

    .restart-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 16px 40px;
      border: none;
      border-radius: 60px;
      background: linear-gradient(135deg, var(--accent-magenta), #d50000);
      color: #fff;
      font-family: var(--font-body);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease;
      box-shadow: 0 4px 20px rgba(255, 45, 123, 0.3);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .restart-btn:active {
      transform: scale(0.95);
    }

    /* ══════════════════════════════════════════
   STATS SCREEN
   ══════════════════════════════════════════ */
    .stat-card {
      background: var(--bg-card);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .stat-card h4 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    .stat-big {
      font-family: var(--font-mono);
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent-cyan);
    }

    .stat-sub {
      font-size: 0.82rem;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .stat-row .sr-val {
      font-family: var(--font-mono);
      color: var(--accent-gold);
    }

    /* ══════════════════════════════════════════
   JUICE: PARTICLES, SHAKE, POPUP
   ══════════════════════════════════════════ */
    .particle {
      position: fixed;
      pointer-events: none;
      border-radius: 50%;
      z-index: 999;
    }

    .shake {
      animation: shakeAnim 0.3s ease;
    }

    @keyframes shakeAnim {

      0%,
      100% {
        transform: translateX(0);
      }

      20% {
        transform: translateX(-4px);
      }

      40% {
        transform: translateX(4px);
      }

      60% {
        transform: translateX(-3px);
      }

      80% {
        transform: translateX(3px);
      }
    }

    .score-popup {
      position: fixed;
      pointer-events: none;
      font-family: var(--font-mono);
      font-size: 1.4rem;
      font-weight: 700;
      z-index: 998;
      animation: popFloat 1.2s ease-out forwards;
    }

    @keyframes popFloat {
      0% {
        opacity: 1;
        transform: translateY(0) scale(1.2);
      }

      100% {
        opacity: 0;
        transform: translateY(-80px) scale(0.8);
      }
    }

    /* ══════════════════════════════════════════
   LOADING / ERROR STATES
   ══════════════════════════════════════════ */
    .loading-spinner {
      width: 40px;
      height: 40px;
      margin: 40px auto;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: var(--accent-cyan);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .error-msg {
      padding: 16px;
      margin: 20px 0;
      background: rgba(255, 61, 61, 0.08);
      border: 1px solid rgba(255, 61, 61, 0.2);
      border-radius: 12px;
      color: var(--accent-red);
      font-size: 0.88rem;
      line-height: 1.5;
      text-align: center;
    }

    /* ══════════════════════════════════════════
   UTILITIES
   ══════════════════════════════════════════ */
    .mt-12 {
      margin-top: 12px;
    }

    .mb-24 {
      margin-bottom: 24px;
    }

    .text-center {
      text-align: center;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>

<body>
  <div id="game-container">

    <!-- ALL SCREENS RENDERED BY JS -->

  </div>

  <script>
    // ═══════════════════════════════════════════════════════════
    //  MODULE 0: CONSTANTS & CONFIG
    // ═══════════════════════════════════════════════════════════
    const CONFIG = {
      METRIC_SCALE: 5,          // metric_effect * SCALE = % change
      MAX_SESSIONS: 100,
      SAVE_KEYS: {
        profile: 'mn_player_profile',
        history: 'mn_session_history',
        settings: 'mn_settings',
        current: 'mn_current_session',
        stats: 'mn_stats'
      },
      HARD_BLOCKS: [
        { tags: ['parent_young_child', 'parent_teenager', 'teenager_parent'], themes: ['romance', 'intimacy'] },
        { tags: ['siblings'], themes: ['romance', 'intimacy'] },
        { tags: ['*_child', 'teenager_*'], ageBlock: 'adult' },
        { themes: ['romance', 'intimacy'], requireRelationship: ['romantic_partner', 'ex_partners'] },
        { intensity: 'critical', ageBlock: 'all' }
      ]
    };

    const RELATIONSHIP_CATEGORIES = {
      romantic_partner: { icon: '💑', name: 'Związek' },
      parent_young_child: { icon: '👨‍👧', name: 'Rodzic → małe dziecko' },
      parent_teenager: { icon: '👨‍👧‍👦', name: 'Rodzic → nastolatek' },
      teenager_parent: { icon: '🧑‍🤝‍🧑', name: 'Nastolatek → rodzic' },
      child_parent: { icon: '👨‍👩‍👦', name: 'Dziecko → rodzic' },
      siblings: { icon: '👫', name: 'Rodzeństwo' },
      friends: { icon: '🤝', name: 'Przyjaciele' },
      coworkers: { icon: '💼', name: 'Współpracownicy' },
      boss_employee: { icon: '👔', name: 'Szef → pracownik' },
      employee_boss: { icon: '🙋', name: 'Pracownik → szef' },
      ex_partners: { icon: '💔', name: 'Byli partnerzy' }
    };

    const TRAIT_NAMES = {
      impulsiveness: 'Impulsywność',
      patience: 'Cierpliwość',
      defensiveness: 'Defensywność',
      empathy: 'Empatia',
      need_for_control: 'Potrzeba kontroli',
      shame_sensitivity: 'Wrażliwość na wstyd',
      directness: 'Bezpośredniość',
      repair_ability: 'Zdolność naprawy'
    };

    // ═══════════════════════════════════════════════════════════
    //  MODULE 1: STATE MANAGER
    // ═══════════════════════════════════════════════════════════
    const StateManager = {
      current: 'MENU',
      data: {
        scenarios: [],
        activeScenario: null,
        currentInteraction: 0,
        totalScore: 0,
        maxScore: 0,
        choicesMade: [],
        meters: { tension: 50, trust: 50, openness: 50, feeling_heard: 50 },
        playerProfile: null,
        sessionHistory: [],
        selectedCategory: null
      },

      transition(newState) {
        const container = document.getElementById('game-container');
        container.innerHTML = '';
        this.current = newState;
        this.render();
      },

      render() {
        switch(this.current) {
          case 'MENU': ScreenMenu.render(); break;
          case 'PROFILE_QUIZ': ScreenProfileQuiz.render(); break;
          case 'PROFILE_VIEW': ScreenProfileView.render(); break;
          case 'SCENARIO_SELECT': ScreenScenarioSelect.render(); break;
          case 'CHARACTER_INTRO': ScreenCharacterIntro.render(); break;
          case 'INTERACTION': ScreenInteraction.render(); break;
          case 'ENDING': ScreenEnding.render(); break;
          case 'STATS': ScreenStats.render(); break;
        }
      },

      init() {
        SaveManager.load();
        this.render();
      }
    };

    // ═══════════════════════════════════════════════════════════
    //  MODULE 10: SAVE MANAGER
    // ═══════════════════════════════════════════════════════════
    const SaveManager = {
      _storageAvailable: true,

      _get(key) {
        if (!this._storageAvailable) return null;
        try { return JSON.parse(localStorage.getItem(key)); }
        catch (e) { return null; }
      },
      _set(key, val) {
        if (!this._storageAvailable) return;
        try { localStorage.setItem(key, JSON.stringify(val)); }
        catch (e) { this._storageAvailable = false; }
      },

      load() {
        try { localStorage.setItem('_test', '1'); localStorage.removeItem('_test'); }
        catch (e) { this._storageAvailable = false; }

        const profile = this._get(CONFIG.SAVE_KEYS.profile);
        if (profile) StateManager.data.playerProfile = profile;

        const history = this._get(CONFIG.SAVE_KEYS.history);
        if (history) StateManager.data.sessionHistory = history.slice(-CONFIG.MAX_SESSIONS);
      },

      saveProfile(profile) {
        StateManager.data.playerProfile = profile;
        this._set(CONFIG.SAVE_KEYS.profile, profile);
      },

      saveSession(session) {
        StateManager.data.sessionHistory.push(session);
        if (StateManager.data.sessionHistory.length > CONFIG.MAX_SESSIONS) {
          StateManager.data.sessionHistory = StateManager.data.sessionHistory.slice(-CONFIG.MAX_SESSIONS);
        }
        this._set(CONFIG.SAVE_KEYS.history, StateManager.data.sessionHistory);
      },

      saveCurrentState() {
        this._set(CONFIG.SAVE_KEYS.current, {
          scenarioId: StateManager.data.activeScenario?.scenario_id,
          interaction: StateManager.data.currentInteraction,
          score: StateManager.data.totalScore,
          choices: StateManager.data.choicesMade,
          meters: StateManager.data.meters
        });
      },

      clearCurrentState() {
        if (!this._storageAvailable) return;
        try { localStorage.removeItem(CONFIG.SAVE_KEYS.current); } catch (e) { }
      },

      getCurrentState() { return this._get(CONFIG.SAVE_KEYS.current); },

      resetProfile() {
        StateManager.data.playerProfile = null;
        if (!this._storageAvailable) return;
        try { localStorage.removeItem(CONFIG.SAVE_KEYS.profile); } catch (e) { }
      },

      getBestScore(scenarioId) {
        const sessions = StateManager.data.sessionHistory.filter(s => s.scenarioId === scenarioId);
        if (!sessions.length) return null;
        return Math.max(...sessions.map(s => s.score));
      },

      getStats() {
        const h = StateManager.data.sessionHistory;
        if (!h.length) return null;
        const totalGames = h.length;
        const avgScore = h.reduce((a, s) => a + s.score, 0) / totalGames;
        const endings = {};
        h.forEach(s => { endings[s.endingColor] = (endings[s.endingColor] || 0) + 1; });
        return { totalGames, avgScore, endings };
      }
    };

    // ═══════════════════════════════════════════════════════════
    //  MODULE 2: SCENARIO LOADER
    // ═══════════════════════════════════════════════════════════
    const ScenarioLoader = {
      scenarios: [],

      async loadFromJSON(jsonData) {
        try {
          const scenario = typeof jsonData === 'string' ? JSON.parse(jsonData) : jsonData;
          if (!this.validate(scenario)) return null;
          if (!this.checkTagCompatibility(scenario.tags)) {
            console.warn('Tag incompatibility in scenario:', scenario.scenario_id);
            return null;
          }
          return scenario;
        } catch (e) {
          console.error('JSON parse error:', e);
          return null;
        }
      },

      validate(s) {
        if (!s.scenario_id || !s.metadata || !s.tags || !s.characters || !s.interactions || !s.endings) {
          console.error('Missing required fields');
          return false;
        }
        if (!s.interactions.length) { console.error('No interactions'); return false; }
        for (const int of s.interactions) {
          if (!int.choices || int.choices.length !== 4) {
            console.error('Each interaction needs exactly 4 choices:', int.interaction_id);
            return false;
          }
        }
        return true;
      },

      checkTagCompatibility(tags) {
        const rt = tags.relationship_type;
        const themes = tags.theme || [];
        const age = tags.age_rating;
        const intensity = tags.emotional_intensity;

        // parent/teenager + romance/intimacy
        if (['parent_young_child', 'parent_teenager', 'teenager_parent'].includes(rt)) {
          if (themes.includes('romance') || themes.includes('intimacy')) return false;
        }
        // siblings + romance/intimacy
        if (rt === 'siblings' && (themes.includes('romance') || themes.includes('intimacy'))) return false;
        // child/teenager + adult rating
        if (['parent_young_child', 'parent_teenager', 'teenager_parent', 'child_parent'].includes(rt) && age === 'adult') return false;
        // romance/intimacy only for romantic_partner/ex_partners
        if ((themes.includes('romance') || themes.includes('intimacy')) &&
          !['romantic_partner', 'ex_partners'].includes(rt)) return false;
        // critical + all
        if (intensity === 'critical' && age === 'all') return false;

        return true;
      },

      async loadEmbedded() {
        // Load embedded scenarios (bundled in this file)
        return EMBEDDED_SCENARIOS;
      }
    };

    // ═══════════════════════════════════════════════════════════
    //  MODULE 3: PROFILE MANAGER — QUIZ DATA
    // ═══════════════════════════════════════════════════════════
    const PROFILE_QUIZ = [
      {
        question: "Kiedy ktoś cię krytykuje, zwykle:",
        answers: [
          { text: "Od razu odpowiadam ostro, bronię się", effects: { impulsiveness: 2, defensiveness: 1 } },
          { text: "Bronię się, tłumacząc swoją rację spokojnie", effects: { defensiveness: 2 } },
          { text: "Wycofuję się i milczę, choć w środku kipi", effects: { directness: -2, shame_sensitivity: 1 } },
          { text: "Słucham i pytam, co konkretnie mają na myśli", effects: { empathy: 2, repair_ability: 1 } }
        ]
      },
      {

    const ProfileManager = {
      calculateProfile(answers) {
        const profile = {
          impulsiveness: 5, patience: 5, defensiveness: 5, empathy: 5,
          need_for_control: 5, shame_sensitivity: 5, directness: 5, repair_ability: 5
        };
        answers.forEach((ansIdx, qIdx) => {
          const effects = PROFILE_QUIZ[qIdx].answers[ansIdx].effects;
          for (const trait in effects) {
            profile[trait] = Math.max(1, Math.min(10, profile[trait] + effects[trait]));
          }
        });
        return profile;
      },

      updateAfterSession(choices, scenario) {
        if (!StateManager.data.playerProfile) return;
        const p = StateManager.data.playerProfile;
        choices.forEach((ci, i) => {
          const style = scenario.interactions[i]?.choices[ci]?.communication_style;
          if (style === 'empathic') { p.empathy = Math.min(10, p.empathy + 0.2); p.repair_ability = Math.min(10, p.repair_ability + 0.1); }
          if (style === 'aggressive') { p.impulsiveness = Math.min(10, p.impulsiveness + 0.1); p.defensiveness = Math.min(10, p.defensiveness + 0.1); }
          if (style === 'passive_aggressive') { p.directness = Math.max(1, p.directness - 0.1); }
          if (style === 'assertive') { p.directness = Math.min(10, p.directness + 0.1); }
        });
        // Round to 1 decimal
        for (const k in p) p[k] = Math.round(p[k] * 10) / 10;
        SaveManager.saveProfile(p);
      }
    };

    const MetricsEngine = {
      init(metricsStart) {
        StateManager.data.meters = { ...metricsStart };
      },
      apply(effects) {
        const m = StateManager.data.meters;
        for (const key in effects) {
          if (m[key] !== undefined) {
            m[key] = Math.max(0, Math.min(100, m[key] + effects[key] * CONFIG.METRIC_SCALE));
          }
        }
      },
      get() { return { ...StateManager.data.meters }; }
    };

    //  MODULE 5: SCENE RENDERER (Canvas)
    // ═══════════════════════════════════════════════════════════
    const SceneRenderer = {
      MOODS: {
        warm: { bg1: '#2e1a1a', bg2: '#3e2816', accent: '#ffa726', overlay: 'rgba(255,165,0,0.06)' },
        cold: { bg1: '#1a1a2e', bg2: '#162140', accent: '#42a5f5', overlay: 'rgba(66,165,245,0.06)' },
        tense: { bg1: '#2e1a1a', bg2: '#3e1620', accent: '#ff5252', overlay: 'rgba(255,82,82,0.08)' },
        neutral: { bg1: '#1a1a2e', bg2: '#16213e', accent: '#888', overlay: 'rgba(0,0,0,0)' },
        dark: { bg1: '#0c0c14', bg2: '#101020', accent: '#555', overlay: 'rgba(0,0,0,0.15)' },
        hopeful: { bg1: '#1a2e1a', bg2: '#163e20', accent: '#66bb6a', overlay: 'rgba(102,187,106,0.06)' }
      },

      draw(canvasId, scene, npcName, playerName, meters) {
        const canvas = document.getElementById(canvasId);
        if (!canvas) return;
        const parent = canvas.parentElement.parentElement;
        const w = parent.clientWidth;
        const h = parent.clientHeight || (w * 9 / 16);
        canvas.width = w * 2; canvas.height = h * 2;
        canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
        const ctx = canvas.getContext('2d');
        ctx.scale(2, 2);

        const mood = this.MOODS[scene.visual_mood] || this.MOODS.neutral;

        // Background gradient
        const grad = ctx.createLinearGradient(0, 0, w, h);
        grad.addColorStop(0, mood.bg1); grad.addColorStop(1, mood.bg2);
        ctx.fillStyle = grad; ctx.fillRect(0, 0, w, h);

        // Ambient particles
        ctx.globalAlpha = 0.08;
        for (let i = 0; i < 30; i++) {
          ctx.beginPath();
          ctx.arc(Math.random() * w, Math.random() * h, Math.random() * 3 + 1, 0, Math.PI * 2);
          ctx.fillStyle = mood.accent; ctx.fill();
        }
        ctx.globalAlpha = 1;

        // Floor
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.fillRect(0, h * 0.72, w, h * 0.28);

        // Location-specific elements
        this._drawLocation(ctx, w, h, scene.location);

        // Characters
        this._drawStickSitting(ctx, w * 0.18, h * 0.38, 'rgba(100,140,200,0.8)');
        this._drawStickStanding(ctx, w * 0.52, h * 0.25, 'rgba(230,100,120,0.8)');

        // Tension overlay
        const ta = (meters?.tension || 50) / 500;
        ctx.fillStyle = `rgba(255,0,0,${ta})`;
        ctx.fillRect(0, 0, w, h);

        // Mood overlay
        ctx.fillStyle = mood.overlay;
        ctx.fillRect(0, 0, w, h);
      },

      _drawLocation(ctx, w, h, loc) {
        // Window
        ctx.fillStyle = 'rgba(255,255,200,0.04)';
        ctx.fillRect(w * 0.6, h * 0.05, w * 0.25, h * 0.35);
        ctx.strokeStyle = 'rgba(255,255,200,0.08)';
        ctx.lineWidth = 1;
        ctx.strokeRect(w * 0.6, h * 0.05, w * 0.25, h * 0.35);

        if (loc === 'living_room' || loc === 'kitchen') {
          // Table
          ctx.fillStyle = 'rgba(80,60,40,0.6)';
          this._roundRect(ctx, w * 0.35, h * 0.48, w * 0.3, h * 0.08, 4); ctx.fill();
          // Plates
          ctx.fillStyle = 'rgba(200,200,210,0.4)';
          ctx.beginPath(); ctx.ellipse(w * 0.43, h * 0.47, 12, 6, 0, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.ellipse(w * 0.55, h * 0.46, 10, 5, 0.2, 0, Math.PI * 2); ctx.fill();
          // Couch
          ctx.fillStyle = 'rgba(60,50,80,0.7)';
          this._roundRect(ctx, w * 0.05, h * 0.45, w * 0.28, h * 0.22, 8); ctx.fill();
        }
      },

      _drawStickSitting(ctx, x, y, color) {
        ctx.strokeStyle = color; ctx.lineWidth = 3; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.arc(x, y, 10, 0, Math.PI * 2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x, y + 10); ctx.lineTo(x, y + 30); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x - 12, y + 18); ctx.lineTo(x, y + 16); ctx.lineTo(x + 12, y + 14); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x, y + 30); ctx.lineTo(x - 10, y + 40); ctx.moveTo(x, y + 30); ctx.lineTo(x + 10, y + 40); ctx.stroke();
      },

      _drawStickStanding(ctx, x, y, color) {
        ctx.strokeStyle = color; ctx.lineWidth = 3; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.arc(x, y, 10, 0, Math.PI * 2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x, y + 10); ctx.lineTo(x, y + 38); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x - 14, y + 22); ctx.lineTo(x, y + 18); ctx.lineTo(x + 14, y + 22); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x, y + 38); ctx.lineTo(x - 10, y + 55); ctx.moveTo(x, y + 38); ctx.lineTo(x + 10, y + 55); ctx.stroke();
      },

      _roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r); ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h); ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r); ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y); ctx.closePath();
      }
    };

    function spawnParticles(x, y, color, count) {
      for (let i = 0; i < count; i++) {
        const el = document.createElement('div');
        el.className = 'particle';
        const size = Math.random() * 6 + 3;
        const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
        const dist = Math.random() * 80 + 40;
        el.style.cssText = `width:${size}px;height:${size}px;background:${color};left:${x}px;top:${y}px;opacity:1;transition:all ${0.6 + Math.random() * 0.4}s cubic-bezier(0.25,0.46,0.45,0.94);`;
        document.body.appendChild(el);
        requestAnimationFrame(() => {
          el.style.transform = `translate(${Math.cos(angle) * dist}px,${Math.sin(angle) * dist}px)`;
          el.style.opacity = '0';
        });
        setTimeout(() => el.remove(), 1200);
      }
    }

    function spawnScorePopup(pts) {
      const el = document.createElement('div');
      el.className = 'score-popup';
      el.textContent = `+${pts}`;
      el.style.color = pts === 2 ? '#00e676' : '#ffd740';

      el.style.textShadow = `0 0 20px ${pts === 2 ? 'rgba(0,230,118,0.5)' : 'rgba(255,215,64,0.5)'}`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1300);
    }

    // ═══════════════════════════════════════════════════════════

    // ═══════════════════════════════════════════════════════════
    //  SCREEN: INTERACTION (main gameplay)
    // ═══════════════════════════════════════════════════════════
    const ScreenInteraction = {
      choiceMade: false,

      render() {
        this.choiceMade = false;
        const c = document.getElementById('game-container');

        const intRaw = s.interactions[idx];
        const m = StateManager.data.meters;
        const totalInts = s.interactions.length;

        // Dynamic scene variant selection based on accumulated score
        const int = { ...intRaw };
        if (idx > 0 && intRaw.scene_low && intRaw.scene_high) {
          const score = StateManager.data.totalScore;
          const threshold = intRaw.score_threshold ?? idx;
          if (score >= threshold) {
            int.scene = intRaw.scene_high;
            int.npc_line = intRaw.npc_line_high;

            int.npc_line = intRaw.npc_line_low;

        }

        let dots = '';
        for (let i = 0; i < totalInts; i++) {

          dots += `<div class="${cls}"></div>`;
        }

        // Meters
        const metersHTML = `
      <div class="meters-bar">
        <div class="meter-item"><div class="meter-icon">🔥</div><div class="meter-label">Napięcie</div><div class="meter-track"><div class="meter-fill tension" id="m-tension" style="width:${m.tension}%"></div></div></div>
        <div class="meter-item"><div class="meter-icon">🤝</div><div class="meter-label">Zaufanie</div><div class="meter-track"><div class="meter-fill trust" id="m-trust" style="width:${m.trust}%"></div></div></div>
        <div class="meter-item"><div class="meter-icon">💬</div><div class="meter-label">Dialog</div><div class="meter-track"><div class="meter-fill openness" id="m-openness" style="width:${m.openness}%"></div></div></div>

      </div>
    `;

        // NPC line or stage direction
        let npcBubble = '';
        if (int.npc_line) {
          npcBubble = `
        <div class="speech-bubble-wrap">
          <div class="speech-bubble">
            <div class="speaker">${s.characters.npc.name}</div>
            ${int.npc_line}
          </div>
        </div>
      `;
        } else if (int.npc_stage_direction) {
          npcBubble = `
        <div style="padding:0 18px 18px;">
          <div style="font-size:0.88rem;color:var(--text-dim);font-style:italic;line-height:1.5;">${int.npc_stage_direction}</div>

      </div>
    `).join('');

        c.innerHTML = `
      <div class="screen active fade-in" style="min-height:100vh;">
        <div class="interaction-top-bar">
          <div class="interaction-label">INTERAKCJA ${idx + 1}/${totalInts}</div>
          <div class="interaction-progress">${dots}</div>
        </div>
        ${metersHTML}

              <div class="panel-illustration">

            <div id="next-btn-area" style="padding:10px 0 40px;"></div>
          </div>
        </div>
      </div>
    `;

        // Draw scene
        requestAnimationFrame(() => {
          SceneRenderer.draw('scene-canvas', int.scene, s.characters.npc.name, s.characters.player.name, m);
        });

        // Attach choice listeners
        document.querySelectorAll('.choice-card').forEach(card => {
          card.addEventListener('click', () => this.handleChoice(parseInt(card.dataset.choice)));
        });

        // Save current state
        SaveManager.saveCurrentState();
      },

      handleChoice(ci) {
        if (this.choiceMade) return;
        this.choiceMade = true;

        const s = StateManager.data.activeScenario;
        const idx = StateManager.data.currentInteraction;
        const int = s.interactions[idx];
        const choice = int.choices[ci];

        // Mark selection and show quality
        document.querySelectorAll('.choice-card').forEach((card, i) => {
          card.style.pointerEvents = 'none';
          if (i === ci) card.classList.add('selected');
          setTimeout(() => {
            const pts = int.choices[i].points;
            if (pts === 2) card.classList.add('result-best');
            else if (pts === 1) card.classList.add('result-good');
            else card.classList.add('result-bad');
          }, 300);
        });

        // Score
        StateManager.data.totalScore += choice.points;
        StateManager.data.choicesMade.push(ci);

        // Metrics
        setTimeout(() => {
          MetricsEngine.apply(choice.metric_effects);
          const m = StateManager.data.meters;
          const mt = document.getElementById('m-tension');
          const mr = document.getElementById('m-trust');
          const mo = document.getElementById('m-openness');
          const mh = document.getElementById('m-heard');
          if (mt) mt.style.width = m.tension + '%';
          if (mr) mr.style.width = m.trust + '%';
          if (mo) mo.style.width = m.openness + '%';
          if (mh) mh.style.width = m.feeling_heard + '%';
        }, 400);

        // Effects
        if (choice.points === 0) screenShake();
        if (choice.points > 0) spawnScorePopup(choice.points);
        if (choice.points === 2) spawnParticles(window.innerWidth / 2, window.innerHeight / 2, '#00e676', 15);

        // Show NPC reaction
        setTimeout(() => {
          const reactionArea = document.getElementById('reaction-area');
          if (choice.npc_reaction) {
            reactionArea.innerHTML = `
          <div class="npc-reaction-wrap">
            <div class="npc-reaction-bubble">
              <div class="speaker">${s.characters.npc.name}</div>
              ${choice.npc_reaction}
            </div>
          </div>
        `;
          }
        }, 400);

        // Show feedback
        setTimeout(() => {
          const fb = choice.feedback;
          const qualClass = choice.points === 2 ? 'best' : choice.points === 1 ? 'good' : 'bad';
          const icon = choice.points === 2 ? '★' : choice.points === 1 ? '✓' : '⚠️';
          const tagsHTML = (choice.tags || []).map(t =>
            `<span class="psych-tag ${t.type}">${t.text}</span>`
          ).join('');
          const hintHTML = fb.better_alternative_hint ?
            `<div class="feedback-hint">💡 ${fb.better_alternative_hint}</div>` : '';

          document.getElementById('feedback-area').innerHTML = `
        <div class="feedback-panel">
          <div class="feedback-verdict">
            <div class="verdict-icon ${qualClass}">${icon}</div>
            <div class="verdict-text ${qualClass}">${fb.label}</div>
          </div>
          <div class="feedback-points">+<span>${choice.points}</span> ${choice.points===0?'punktów':choice.points===1?'punkt':'punkty'} · Wynik: <span>${StateManager.data.totalScore}/${StateManager.data.maxScore}</span></div>
          <div class="feedback-body">${fb.psychology}</div>
          ${hintHTML}
          <div class="mt-12">${tagsHTML}</div>
        </div>
      `;

          // Scroll down
          const scroll = document.getElementById('interaction-scroll');
          setTimeout(() => scroll?.scrollTo({ top: scroll.scrollHeight, behavior: 'smooth' }), 100);

          // Next button
          const isLast = idx >= s.interactions.length - 1;
          document.getElementById('next-btn-area').innerHTML = `
        <button class="continue-btn" id="btn-next">${isLast ? 'ZOBACZ ZAKOŃCZENIE →' : 'NASTĘPNA SCENA →'}</button>
      `;
          document.getElementById('btn-next').addEventListener('click', () => {
            if (isLast) {
              this._finishSession();
            } else {
              StateManager.data.currentInteraction++;
              StateManager.transition('INTERACTION');
            }
          });
        }, 700);
      },

      _finishSession() {
        const s = StateManager.data.activeScenario;
        // Find ending
        const score = StateManager.data.totalScore;
        let ending = s.endings.find(e => score >= e.score_range.min && score <= e.score_range.max);
        if (!ending) ending = s.endings[s.endings.length - 1]; // fallback

        StateManager.data.activeEnding = ending;

        // Update profile
        ProfileManager.updateAfterSession(StateManager.data.choicesMade, s);

        // Save session
        SaveManager.saveSession({
          scenarioId: s.scenario_id,
          date: new Date().toISOString(),
          score: score,
          maxScore: StateManager.data.maxScore,
          endingColor: ending.color,
          endingId: ending.ending_id,
          choices: [...StateManager.data.choicesMade]
        });

        SaveManager.clearCurrentState();
        StateManager.transition('ENDING');
      }
    };

    // ═══════════════════════════════════════════════════════════
    //  SCREEN: ENDING
    // ═══════════════════════════════════════════════════════════
    const ScreenEnding = {
      render() {
        const c = document.getElementById('game-container');
        const s = StateManager.data.activeScenario;
        const ending = StateManager.data.activeEnding;
        const m = StateManager.data.meters;
        const score = StateManager.data.totalScore;
        const maxScore = StateManager.data.maxScore;

        // Check if new best
        const history = StateManager.data.sessionHistory.filter(h => h.scenarioId === s.scenario_id);
        const prevBest = history.length > 1 ? Math.max(...history.slice(0, -1).map(h => h.score)) : -1;
        const isNewBest = score > prevBest && prevBest >= 0;

        // Choices summary dots
        const choiceDots = StateManager.data.choicesMade.map((ci, i) => {
          const pts = s.interactions[i].choices[ci].points;
          return `<div class="choice-dot pts-${pts}">${pts}</div>`;
        }).join('');

        // Meters summary
        const metersSummary = `
      <div class="ending-diagnosis">

          ${this._meterRow('🔥', 'Napięcie', m.tension, '--tension-color')}
          ${this._meterRow('🤝', 'Zaufanie', m.trust, '--trust-color')}
          ${this._meterRow('💬', 'Otwartość na dialog', m.openness, '--openness-color')}
          ${this._meterRow('👂', 'Poczucie bycia słuchanym', m.feeling_heard, '--heard-color')}
        </div>
      </div>
    `;

        // Dominant style
        const styles = {};
        StateManager.data.choicesMade.forEach((ci, i) => {
          const st = s.interactions[i].choices[ci].communication_style;
          styles[st] = (styles[st] || 0) + 1;
        });
        const dominantStyle = Object.entries(styles).sort((a, b) => b[1] - a[1])[0]?.[0] || 'mixed';
        const styleLabels = {
          aggressive: 'agresywny', passive: 'pasywny', passive_aggressive: 'pasywno-agresywny',
          assertive: 'asertywny', empathic: 'empatyczny', transactional: 'transakcyjny', transformative: 'transformacyjny'
        };

        c.innerHTML = `
      <div class="screen active fade-in" style="min-height:100vh;">
        <div class="scroll-area" style="padding-top:20px;">
          <div class="ending-screen">
            <div class="new-best-banner ${isNewBest ? 'show' : ''}">🏆 NOWY REKORD!</div>
            <div class="ending-badge ${ending.color}">${ending.emoji}</div>
            <div class="ending-title ${ending.color}">${ending.title}</div>
            <div style="color:var(--text-secondary);font-size:0.9rem;margin-bottom:6px;">${ending.subtitle}</div>

            <div class="ending-narrative">${ending.narrative}</div>

            <div class="ending-diagnosis">
              <h4>🧠 Analiza psychologiczna</h4>
              <p>${ending.diagnosis}</p>
            </div>

            <div class="ending-diagnosis">
              <h4>💬 Twój styl w tej sesji</h4>
              <p>Dominujący styl komunikacji: <strong style="color:var(--accent-cyan)">${styleLabels[dominantStyle] || dominantStyle}</strong></p>
            </div>

            <div class="ending-diagnosis">
              <h4>💡 Rada na przyszłość</h4>
              <p style="color:var(--accent-gold)">${ending.post_game?.growth_tip || s.post_game?.growth_tip || ''}</p>
            </div>

            <div style="margin:0 auto;max-width:400px;">${metersSummary}</div>

            <div style="margin-top:24px;">
              <button class="restart-btn" id="btn-replay">↻ ZAGRAJ PONOWNIE</button>

            <div class="menu-hint" style="margin-top:12px;">${ending.post_game?.replay_prompt || s.post_game?.replay_prompt || ''}</div>
            <div style="margin-top:16px;">
              <button class="menu-btn" id="btn-menu" style="max-width:300px;margin:0 auto;">
                <span class="btn-icon">🏠</span><span class="btn-label">Menu główne</span>
              </button>
            </div>
            <div style="height:40px"></div>
          </div>
        </div>
      </div>
    `;

        // Confetti for green ending
        if (ending.color === 'green') {
          setTimeout(() => {
            for (let i = 0; i < 5; i++) {
              setTimeout(() => {
                spawnParticles(
                  Math.random() * window.innerWidth,
                  Math.random() * window.innerHeight * 0.5,
                  ['#00e676', '#ffd740', '#00e5ff'][Math.floor(Math.random() * 3)], 10
                );
              }, i * 200);
            }
          }, 500);

        document.getElementById('btn-replay').addEventListener('click', () => {
          StateManager.data.currentInteraction = 0;

          StateManager.transition('INTERACTION');
        });

        document.getElementById('btn-menu').addEventListener('click', () => {
          StateManager.data.selectedCategory = null;
          StateManager.transition('MENU');
        });
      },

      _meterRow(icon, label, val, colorVar) {
        const colorMap = {
          '--tension-color': 'var(--tension-color)',
          '--trust-color': 'var(--trust-color)',
          '--openness-color': 'var(--openness-color)',
          '--heard-color': 'var(--heard-color)'

        const cls = colorVar.replace('--', '').replace('-color', '');

    const _scenariosReady = (async function loadBundledScenarios() {

    //  CUSTOM SCENARIO LOADER (for adding new JSON scenarios)
    // ═══════════════════════════════════════════════════════════
    async function loadExternalScenario(url) {
      try {
        const resp = await fetch(url);
        if (!resp.ok) throw new Error('Fetch failed: ' + resp.status);
        const json = await resp.json();
        const validated = await ScenarioLoader.loadFromJSON(json);
        if (validated) {
          // Avoid duplicates
          if (!EMBEDDED_SCENARIOS.find(s => s.scenario_id === validated.scenario_id)) {
            EMBEDDED_SCENARIOS.push(validated);
          }
          return validated;
        }
      } catch (e) {
        console.error('Failed to load scenario:', e);
      }
      return null;
    }
